<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnotMaster Pro 🪢 - Learn Knot Tying</title>
    <meta name="description" content="Interactive knot tying tutorial with 40+ knots, step-by-step guides, achievements, quiz, and progress tracking.">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪢</text></svg>">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>KnotMaster Pro 🪢</h1>
            <div class="header-controls">
                <button id="themeToggle" class="icon-btn" title="Toggle Theme" aria-label="Toggle dark/light mode">🌙</button>
                <button id="achievementsBtn" class="icon-btn" title="Achievements" aria-label="View achievements">🏆</button>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-text" aria-live="polite">Progress: <span id="progressPercent">0</span>% (<span id="knotsLearnedCount">0</span>/40)</div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="40"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="controls" role="search">
            <input type="search" id="searchInput" placeholder="Search knots..." aria-label="Search knots by name or description">
            <select id="difficultyFilter" aria-label="Filter by difficulty">
                <option value="all">All Difficulties</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
            <select id="tagFilter" aria-label="Filter by category">
                <option value="all">All Categories</option>
                <option value="loop">Loop</option>
                <option value="hitch">Hitch</option>
                <option value="bend">Bend</option>
                <option value="stopper">Stopper</option>
                <option value="climbing">Climbing</option>
                <option value="sailing">Sailing</option>
                <option value="rescue">Rescue</option>
                <option value="decorative">Decorative</option>
            </select>
            <select id="sortOption" aria-label="Sort results">
                <option value="alpha">A-Z</option>
                <option value="difficulty">Difficulty</option>
                <option value="status">Learned First</option>
            </select>
        </section>

        <section id="knotGrid" class="knot-grid" aria-label="Knot cards grid">
            <!-- Dynamic -->
        </section>
    </main>

    <!-- Knot Modal -->
    <div id="knotModal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <button class="close-btn" id="closeModal" aria-label="Close modal">&times;</button>
            <div class="modal-header">
                <h2 id="modalTitle">Knot Name</h2>
                <button id="modalFavBtn" class="fav-btn" aria-label="Toggle favorite">🤍</button>
            </div>
            <div class="modal-badges" id="modalBadges" aria-label="Difficulty and tags"></div>
            <p id="modalDesc" class="modal-desc"></p>
            
            <div class="modal-sections">
                <div class="section">
                    <h3>Step-by-Step</h3>
                    <ol id="modalSteps" class="step-list" aria-label="Tying steps"></ol>
                </div>
                <div class="section info-box use-box">
                    <strong>Real-world Uses:</strong> <span id="modalUses" aria-label="Practical applications"></span>
                </div>
                <div class="section info-box mistake-box">
                    <strong>Common Mistakes:</strong> <span id="modalMistakes" aria-label="Avoid these errors"></span>
                </div>
                <div class="section info-box safety-box">
                    <strong>Safety Notes:</strong> <span id="modalSafety" aria-label="Safety considerations"></span>
                </div>
                <div class="section info-box var-box">
                    <strong>Variations:</strong> <span id="modalVars" aria-label="Alternative versions"></span>
                </div>
            </div>
            <div class="modal-actions">
                <button id="markLearnedBtn" class="primary-btn" aria-label="Mark/unmark as learned">Mark as Learned</button>
            </div>
        </div>
    </div>

    <!-- Achievements Modal -->
    <div id="achievementsModal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal-content">
            <button class="close-btn" id="closeAchieveModal" aria-label="Close achievements">&times;</button>
            <h2>Your Achievements 🏆</h2>
            <div id="achievementsList" class="achievements-grid" aria-label="Achievement badges">
            </div>
        </div>
    </div>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true" role="status"></div>

    <!-- Module Scripts -->
    <script src="data.js"></script>
    <script type="module">
        import { initUI } from './ui.js';
        window.addEventListener('DOMContentLoaded', initUI);
    </script>
</body>
</html>
